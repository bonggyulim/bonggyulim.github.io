title: Bonggyu Lim
description: >-
  AI & Backend Developer Portfolio <br>
  Industrial AI, RAG, LLM, Backend, Deployment
url: "https://bonggyulim.github.io"
baseurl: ""
github: bonggyulim
email: bonggyulim0728@gmail.com
google_analytics: ""

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - Gemfile.lock.old
  - vendor
  - .bundle
  - .bundle-user
  - .jekyll-cache
  - .sass-cache
  - _site
  - _site_preview
  - _site_verify
  - _site_verify2
  - _site_verify3
  - _site_verify4
  - _site_verify5
  - _site_verify6
  - _site_verify7
  - _site_verify8
  - _site_verify9
  - _site_verify10
  - _site_verify11
  - node_modules

comments:
  enabled: false
  repo: ""
  issue-term: pathname
  theme: github-light

collections:
  pages:
    output: true
  projects:
    output: true

defaults:
  - scope:
      type: pages
    values:
      layout: default
  - scope:
      type: projects
    values:
      layout: project
      permalink: /projects/:slug/
