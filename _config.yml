title: Bonggyu Lim
description: >-
  AI & Backend Developer Portfolio <br>
  Industrial AI, RAG, LLM, Backend, Deployment
url: "https://bonggyulim.github.io"
baseurl: ""
github: bonggyulim
email: bonggyulim0728@gmail.com
google_analytics: ""

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - Gemfile.lock.old
  - vendor
  - .bundle
  - .bundle-user
  - .jekyll-cache
  - .sass-cache
  - _site
  - _site_preview
  - node_modules

comments:
  enabled: false
  repo: ""
  issue-term: pathname
  theme: github-light

collections:
  pages:
    output: true
  projects:
    output: true
  tags:
    output: true

defaults:
  - scope:
      type: pages
    values:
      layout: default
  - scope:
      type: posts
    values:
      layout: post
      permalink: /blog/:title/
  - scope:
      type: projects
    values:
      layout: project
      permalink: /projects/:slug/
  - scope:
      type: tags
    values:
      layout: tag
      permalink: /tags/:title/
