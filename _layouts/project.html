---
layout: default
---

<div class="hyde content project-detail">
  {% if page.image and page.image != "placeholder.png" %}
  <img src="{{ site.baseurl }}/assets/images/projects/{{ page.image }}" alt="{{ page.title }}" />
  {% else %}
  <div class="hyde media-placeholder hero">Image placeholder</div>
  {% endif %}
  {{ content }}
</div>
